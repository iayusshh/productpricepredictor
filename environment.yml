name: ml-product-pricing
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  
  # Core data processing
  - pandas=2.3.3
  - numpy=2.2.6
  
  # Machine learning
  - scikit-learn=1.7.2
  - scipy=1.16.2
  
  # Deep learning and NLP
  - pytorch=2.8.0
  - transformers=4.57.0
  - sentence-transformers=5.1.1
  - tokenizers=0.22.1
  - safetensors=0.6.2
  - huggingface_hub=0.35.3
  
  # Image processing
  - pillow=11.3.0
  - opencv=4.12.0
  
  # HTTP and file handling
  - requests=2.32.5
  - urllib3=2.5.0
  
  # Data visualization
  - matplotlib=3.10.7
  - seaborn=0.13.2
  
  # Utilities
  - tqdm=4.67.1
  - joblib=1.5.2
  - psutil=7.1.0
  
  # Configuration
  - pyyaml=6.0.3
  - python-dotenv=1.1.1
  - jsonschema=4.25.1
  
  # Development and testing
  - pytest=8.4.2
  - pytest-cov=7.0.0
  - coverage=7.10.7
  
  # Additional pip dependencies not available in conda
  - pip
  - pip:
    - shap==0.48.0
    - numba==0.62.1
    - llvmlite==0.45.1
    - slicer==0.0.8
    - cloudpickle==3.1.1
    - threadpoolctl==3.6.0
    - hf-xet==1.1.10